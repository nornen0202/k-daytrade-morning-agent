opendart:
  enabled_env: OPENDART_API_KEY
  list_url: https://opendart.fss.or.kr/api/list.json
news:
  enabled_env: NEWS_API_KEY
  rss_urls_env: NEWS_RSS_URLS
  naver_client_id_env: NAVER_CLIENT_ID
  naver_client_secret_env: NAVER_CLIENT_SECRET
  naver_endpoint: https://openapi.naver.com/v1/search/news.json
  newsapi_endpoint: https://newsapi.org/v2/everything
  provider_priority:
    - rss
    - naver
    - newsapi
    - alpha_vantage
    - yfinance
  alpha_vantage_endpoint: https://www.alphavantage.co/query
  yfinance_tickers:
    political_theme:
      - "005930.KS"
      - "000660.KS"
      - "035420.KS"
      - "035720.KS"
    global_issue:
      - "^GSPC"
      - "^IXIC"
      - "SOXX"
      - "NVDA"
    theme_surge:
      - "005930.KS"
      - "000660.KS"
      - "277810.KQ"
      - "042700.KS"
  query_map:
    political_theme:
      - "한국 정책 주식"
      - "정부 산업 정책 증시"
      - "총선 대선 정책 테마주"
    global_issue:
      - "미국 증시 금리 환율 반도체"
      - "중국 경기 원자재 한국 증시"
      - "엔비디아 반도체 지수 한국 증시"
    theme_surge:
      - "시간외 급등 테마 주식"
      - "장전 테마 거래대금"
      - "국내 증시 테마 급등"
quote_provider:
  url_env: QUOTE_PROVIDER_URL
  api_key_env: QUOTE_PROVIDER_API_KEY
openai:
  api_key_env: OPENAI_API_KEY
  model_env: OPENAI_REPORT_MODEL
  default_model: gpt-5.5
llm:
  provider_env: REPORT_LLM_PROVIDER
  default_provider: codex
  codex_model_env: CODEX_REPORT_MODEL
  default_codex_model: gpt-5.5
