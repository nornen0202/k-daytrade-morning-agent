name: Codex Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Codex code review
        uses: openai/codex-action@v1
        with:
          mode: review
          model: gpt-5.5
          prompt: "Review this PR for correctness, security, tests, and publishing safety. Do not modify files."
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

