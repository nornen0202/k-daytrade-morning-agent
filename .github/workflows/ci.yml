name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest
      - name: Dry-run report
        run: python -m daytrade_agent.cli run --dry-run --date 2026-04-27
      - name: Dry-run site build
        run: python -m daytrade_agent.cli build-site

