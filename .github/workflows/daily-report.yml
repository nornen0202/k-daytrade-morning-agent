name: Daily Morning Report

on:
  # GitHub cron is UTC. KST 08:45 is UTC 23:45 on the previous calendar day.
  # If timezone-aware schedules become available, use Mon-Fri 08:45 Asia/Seoul.
  schedule:
    - cron: "45 23 * * 0-4"
  workflow_dispatch:
    inputs:
      date:
        description: "Report date in YYYY-MM-DD. Defaults to current Asia/Seoul date."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-daily-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        shell: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      REPORT_LLM_PROVIDER: codex
      CODEX_REPORT_MODEL: ${{ vars.CODEX_REPORT_MODEL || 'gpt-5.5' }}
      CODEX_BINARY: ${{ vars.CODEX_BINARY }}
      CODEX_HOME: ${{ vars.CODEX_HOME }}
      CODEX_WORKSPACE_DIR: ${{ vars.CODEX_WORKSPACE_DIR }}
      CODEX_REASONING_EFFORT: ${{ vars.CODEX_REASONING_EFFORT || 'medium' }}
      CODEX_SUMMARY: ${{ vars.CODEX_SUMMARY || 'none' }}
      CODEX_PERSONALITY: ${{ vars.CODEX_PERSONALITY || 'none' }}
      CODEX_REQUEST_TIMEOUT: ${{ vars.CODEX_REQUEST_TIMEOUT || '180' }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      NEWS_RSS_URLS: ${{ secrets.NEWS_RSS_URLS }}
      QUOTE_PROVIDER_URL: ${{ secrets.QUOTE_PROVIDER_URL }}
      QUOTE_PROVIDER_API_KEY: ${{ secrets.QUOTE_PROVIDER_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          python -m pip install -e ".[dev]"
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Resolve report date
        run: |
          $reportDate = "${{ github.event.inputs.date }}"
          if ([string]::IsNullOrWhiteSpace($reportDate)) {
            $reportDate = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId(
              [DateTimeOffset]::UtcNow,
              "Korea Standard Time"
            ).ToString("yyyy-MM-dd")
          }
          Add-Content -Path $env:GITHUB_ENV -Value "REPORT_DATE=$reportDate"
          Write-Host "REPORT_DATE=$reportDate"

      - name: Resolve Codex runtime
        run: |
          function Test-CodexCandidate {
            param([string]$Candidate)
            if ([string]::IsNullOrWhiteSpace($Candidate) -or -not (Test-Path $Candidate)) {
              return $false
            }
            try {
              & $Candidate --version | Out-Null
              return ($LASTEXITCODE -eq 0)
            } catch {
              Write-Warning "Codex candidate failed: $Candidate :: $($_.Exception.Message)"
              return $false
            }
          }

          $candidates = [System.Collections.Generic.List[string]]::new()
          if (-not [string]::IsNullOrWhiteSpace($env:CODEX_BINARY)) {
            $candidates.Add($env:CODEX_BINARY)
          }
          $candidates.Add((Join-Path $env:USERPROFILE ".codex\.sandbox-bin\codex.exe"))

          Get-ChildItem -Path "C:\Users\*\.codex\.sandbox-bin\codex.exe" -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            ForEach-Object { $candidates.Add($_.FullName) }

          Get-ChildItem -Path "C:\Users\*\.vscode\extensions\openai.chatgpt-*\bin\windows-x86_64\codex.exe" -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            ForEach-Object { $candidates.Add($_.FullName) }

          $resolvedBinary = $null
          foreach ($candidate in $candidates) {
            if (Test-CodexCandidate $candidate) {
              $resolvedBinary = $candidate
              break
            }
          }
          if (-not $resolvedBinary) {
            throw "Could not find a usable Codex binary. Set CODEX_BINARY or install Codex for the runner service account."
          }

          Add-Content -Path $env:GITHUB_ENV -Value "CODEX_BINARY=$resolvedBinary"
          Write-Host "Resolved Codex binary: $resolvedBinary"

          $resolvedHome = $env:CODEX_HOME
          if ([string]::IsNullOrWhiteSpace($resolvedHome) -and $resolvedBinary -like "*.codex\.sandbox-bin\codex.exe") {
            $resolvedHome = Split-Path (Split-Path $resolvedBinary -Parent) -Parent
          }
          if (-not [string]::IsNullOrWhiteSpace($resolvedHome)) {
            Add-Content -Path $env:GITHUB_ENV -Value "CODEX_HOME=$resolvedHome"
            Write-Host "Using CODEX_HOME: $resolvedHome"
          }

      - name: Verify Codex login and model availability
        run: |
          $workspaceDir = $env:CODEX_WORKSPACE_DIR
          if ([string]::IsNullOrWhiteSpace($workspaceDir)) {
            $workspaceDir = Join-Path $env:GITHUB_WORKSPACE ".codex-preflight"
          }

          $script = @"
          import os
          from daytrade_agent.llm.codex_app_server import (
              CodexAppServerAuthError,
              CodexAppServerBinaryError,
          )
          from daytrade_agent.llm.codex_preflight import run_codex_preflight

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")

          def write_summary(lines):
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")

          try:
              result = run_codex_preflight(
                  codex_binary=None,
                  model=os.getenv("CODEX_REPORT_MODEL", "gpt-5.5"),
                  request_timeout=30.0,
                  workspace_dir=r"$workspaceDir",
                  cleanup_threads=True,
              )
          except CodexAppServerAuthError as exc:
              message = (
                  "Codex is installed but not logged in for the runner. "
                  "Run `codex login` or `codex login --device-auth` on the runner machine."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(["## Codex login required", "", message])
              raise SystemExit(1)
          except CodexAppServerBinaryError as exc:
              message = (
                  "A usable Codex binary or requested Codex model is not available for the runner."
              )
              print(f"::error::{message}")
              print(exc)
              write_summary(["## Codex runtime issue", "", message, "", str(exc)])
              raise SystemExit(1)

          print("Codex account:", result.account)
          print("First available models:", ", ".join(result.models[:8]))
          write_summary(
              [
                  "## Codex preflight passed",
                  "",
                  f"- Account: {result.account}",
                  f"- Models: {', '.join(result.models[:8])}",
                  f"- Binary: {os.getenv('CODEX_BINARY', '(auto)')}",
              ]
          )
          "@
          $script | python -
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Generate report
        run: |
          python -m daytrade_agent.cli run --date "$env:REPORT_DATE"
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Verify report
        continue-on-error: true
        run: |
          python -m daytrade_agent.cli verify --date "$env:REPORT_DATE"

      - name: Build site
        run: |
          python -m daytrade_agent.cli build-site
          if ($LASTEXITCODE) { exit $LASTEXITCODE }

      - name: Commit report content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/reports
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No report content changes."
          } else {
            git commit -m "chore: add daily report $env:REPORT_DATE"
            if ($LASTEXITCODE) { exit $LASTEXITCODE }
            git push
            if ($LASTEXITCODE) { exit $LASTEXITCODE }
          }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
