<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}K-Daytrade Morning Brief{% endblock %}</title>
    <link rel="stylesheet" href="{{ asset_href|default('assets/style.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Korean Pre-market Research</p>
        <h1>{% block page_title %}K-Daytrade Morning Brief{% endblock %}</h1>
      </div>
      <nav>
        <a href="{{ latest_href|default('index.html') }}">Latest</a>
        <a href="{{ archive_href|default('reports/index.html') }}">Archive</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
